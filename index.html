<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>포트폴리오</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="header-left">
    <span class="site-name" id="header-name">이름</span>
    <span class="site-title" id="header-title">브랜드 디자이너</span>
  </div>
  <nav class="header-nav">
    <a href="index.html" class="active">INDEX</a>
    <a href="about.html">INFO</a>
    <a href="mailto:" id="contact-link">CONTACT</a>
    <div class="theme-toggle">
      <span id="btn-light">LIGHT</span>
      <span class="sep">/</span>
      <span id="btn-dark" class="active">DARK</span>
    </div>
  </nav>
</header>

<!-- ── FILTER BAR ── -->
<div class="filter-bar">
  <!-- View toggle -->
  <div class="filter-group" id="view-toggle">
    <button class="filter-btn active" data-view="grid">
      <span class="radio-dot"></span> GRID
    </button>
    <button class="filter-btn" data-view="list">
      <span class="radio-dot"></span> LIST
    </button>
  </div>

  <div class="filter-divider"></div>

  <!-- Category filter -->
  <div class="filter-group" id="cat-filter">
    <button class="filter-btn active" data-cat="all">
      <span class="radio-dot"></span> ALL
    </button>
    <button class="filter-btn" data-cat="브랜드">
      <span class="radio-dot"></span> 브랜드
    </button>
    <button class="filter-btn" data-cat="디지털">
      <span class="radio-dot"></span> 디지털
    </button>
    <button class="filter-btn" data-cat="광고">
      <span class="radio-dot"></span> 광고
    </button>
  </div>
</div>

<!-- ── GRID VIEW ── -->
<main>
  <div id="grid-view"></div>
  <div id="list-view"></div>
</main>

<!-- ── HOVER PREVIEW (list view) ── -->
<div class="list-preview" id="list-preview">
  <img id="preview-img" src="" alt="" />
</div>

<!-- ── FOOTER ── -->
<footer>
  <div class="footer-left" id="footer-name">이름</div>
  <div class="footer-mid" id="footer-bio"></div>
  <div class="footer-right" id="footer-contact"></div>
</footer>

<script src="data/data.js"></script>
<script src="js/main.js"></script>
</body>
</html>
