<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Info</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="header-left">
    <span class="site-name" id="header-name">이름</span>
    <span class="site-title" id="header-title">브랜드 디자이너</span>
  </div>
  <nav class="header-nav">
    <a href="index.html">INDEX</a>
    <a href="about.html" class="active">INFO</a>
    <a href="mailto:" id="contact-link">CONTACT</a>
    <div class="theme-toggle">
      <span id="btn-light">LIGHT</span>
      <span class="sep">/</span>
      <span id="btn-dark" class="active">DARK</span>
    </div>
  </nav>
</header>

<main>
  <div class="about-wrap" id="about-content">
    <!-- JS로 채워짐 -->
  </div>
</main>

<footer>
  <div class="footer-left" id="footer-name">이름</div>
  <div class="footer-mid" id="footer-bio"></div>
  <div class="footer-right" id="footer-contact"></div>
</footer>

<script src="data/data.js"></script>
<script>
async function init() {
  const data = await fetch('data/projects.json').then(r => r.json());
  const { name, title, bio, email, instagram, linkedin } = data.profile;

  document.title = 'Info — ' + name;
  document.getElementById('header-name').textContent = name;
  document.getElementById('header-title').textContent = title;
  document.getElementById('footer-name').textContent = name;
  document.getElementById('footer-bio').textContent = bio;
  document.getElementById('footer-contact').innerHTML =
    email ? `<a href="mailto:${email}">${email}</a>` : '';
  document.getElementById('contact-link').href = email ? `mailto:${email}` : '#';

  const saved = localStorage.getItem('theme') || 'dark';
  setTheme(saved);
  document.getElementById('btn-light').addEventListener('click', () => setTheme('light'));
  document.getElementById('btn-dark').addEventListener('click', () => setTheme('dark'));

  document.getElementById('about-content').innerHTML = `
    <h2>INFO</h2>
    <p class="about-bio">${bio}</p>

    <div class="about-section">
      <h3>연락처</h3>
      ${email ? `<a href="mailto:${email}">${email}</a>` : ''}
      ${instagram ? `<a href="${instagram}" target="_blank">Instagram</a>` : ''}
      ${linkedin ? `<a href="${linkedin}" target="_blank">LinkedIn</a>` : ''}
    </div>

    <div class="about-section">
      <h3>작업 영역</h3>
      <p>광고소재 · 프로모션 · 패키징 및 신제품 디자인</p>
      <p>웹사이트 디자인 · 오프라인 팝업</p>
    </div>
  `;
}

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
  document.getElementById('btn-light').classList.toggle('active', theme === 'light');
  document.getElementById('btn-dark').classList.toggle('active', theme === 'dark');
}

init();
</script>
</body>
</html>
